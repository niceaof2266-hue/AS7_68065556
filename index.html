<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS7_68065556 Jirasin</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
}

/* Video Background */
.video-bg {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* ทำให้เนื้อหาอยู่บน video */
.content {
    position: relative;
    z-index: 1;
    color: white;
}
.center-screen {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
}
.glass-card {
    background: rgba(255, 255, 255, 0.2); /* ความใส */
    backdrop-filter: blur(15px); /* เบลอพื้นหลัง */
    -webkit-backdrop-filter: blur(15px); /* รองรับ Safari */

    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.3);

    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    color: #333;
}
</style>
</style>
</head>

<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">AS7</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="menu" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>

      </ul>
    </div>
  </div>
</nav>

<!-- Video Background -->
<video autoplay muted loop class="video-bg" id="myVideo">
    <source src="VDO/VDO/203923-922675870_medium.mp4" type="video/mp4">
</video>

    <div class="banner-text">
        <h1>68065556</h1>
        <p>จิรสินน์ บัวเข็ม</p>

        <!-- Play Pause Buttons -->
  <div class="text-center my-3">
      <button type="button" class="btn btn-success me-2" onclick="playVideo()">Play</button>
      <button type="button" class="btn btn-danger" onclick="pauseVideo()">Pause</button>
    </div>
</div>

<!-- ✅ Form -->
<div class="container form-section">
    <div class="glass-card p-4">
        <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">ชื่อ-นามสกุล</label>

            <div class="mb-3">
                <label class="form-label">อีเมล</label>

            </div>

                <label class="form-label">รหัสผ่าน</label>
                <input type="password" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">เพศ</label><br>
                <input type="radio" name="g"> ชาย
                <input type="radio" name="g" class="ms-3"> หญิง
            </div>

            <div class="mb-3">
                <label class="form-label">ตำแหน่ง</label>
                <select class="form-select">
                    <option>Manager</option>
                    <option>Developer</option>
                    <option>Designer</option>
                    <option>Marketing</option>
                </select>
            </div>

            <button class="btn btn-primary w-100">ส่งข้อมูล</button>
        </form>
    </div>
</div>

<!-- ✅ JavaScript -->
<script>
let video = document.getElementById("myVideo");

function playVideo() {
    video.play();
}

function pauseVideo() {
    video.pause();
}
</script>

</html>
